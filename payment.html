<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Payment page</title>

    <link href="css/main.css" rel="stylesheet">
    <link href="css/fonts.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <link href="css/product_listing.css" rel="stylesheet">

</head>

<body>

    <!-- header / nav -->
    <header>
        <nav class="header_bar">
            <a class="header_logo" href="#">
                <h1>Savr</h1>
            </a>

            <div class="header_nav_bar">
                <a class="header_nav_bar_item other_font" href="index.html">Back to Style Guide</a>
            </div>
        </nav>
    </header>

    <h2>Checkout</h2>

                <!-- Overall layout of the page -->
                <div class="text_input_field_grid other_font">
                    <!-- the left side of the page -->
                    <div class="text_input_field_column_1">

                        <h4>Enter your name and address:</h4>

                        <div class="form_group">
                            <label for="full_name">Full Name</label>
                            <input id="full_name" type="text" placeholder="Full Name">
                        </div>

                        <div class="payment_merge">
                            <div class="form_group">
                                <label for="address">Street Address</label>
                                <input id="address" type="text" placeholder="1234 St.">
                            </div>

                            <div class="form_group">
                                <label for="apt">Apt</label>
                                <input id="apt" type="text" placeholder="XXX">
                            </div>
                        </div>

                        <div class="payment_merge">
                            <div class="form_group">
                                <label for="city">City</label>
                                <input id="city" type="text" placeholder="City">
                            </div>

                            <div class="form_group">
                                <label for="postal">Postal Code</label>
                                <input id="postal" type="text" placeholder="XXX XXX">
                            </div>
                        </div>

                        <h4>What's your contact information?</h4>

                        <div class="form_group">
                            <label for="email">Email Address</label>
                            <input id="email" type="email" placeholder="youremail@placeholder.com">
                        </div>

                        <div class="form_group">
                            <label for="phone">Phone Number</label>
                            <input id="phone" type="tel" placeholder="+1 (604) 123-4567">
                        </div>

                    </div>

                    <!-- the right side of the page -->
                    <div class="text_input_field_column_2">

                        <h4>Enter your card information:</h4>

                        <div class="form_group">
                            <label for="cardnumber">Card Number</label>
                            <input id="cardnumber" type="text" placeholder="XXXX XXXX XXXX XXXX">
                        </div>

                        <div class="payment_merge">

                            <div class="form_group">
                                <label for="expiration">Expiration</label>
                                <input id="expiration" type="text" placeholder="MM/YY">
                            </div>

                            <div class="form_group">
                                <label for="cvv">CVV</label>
                                <input id="cvv" type="text" placeholder="XXX">
                            </div>

                        </div>

                        <div class="button_group other_font">
                            <a href="#" class="primary_button">Confirm Payment</a>
                            <a href="#cart" class="secondary_button">Back to Cart</a>
                        </div>

                    </div>

                </div>



</body>

</html>
